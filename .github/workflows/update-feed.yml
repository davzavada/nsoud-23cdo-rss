name: Update RSS Feed

on:
  schedule:
    - cron: '0 6 * * *'  # 6:00 UTC = 7:00/8:00 CET/CEST
  workflow_dispatch:       # ruční spuštění

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scrapers
        run: |
          python scraper.py
          python scraper_ipcuria.py
          python scraper_neprimy_ucinek.py
          python scraper_journals.py

      - name: Commit & push feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "Update RSS feeds $(date -u +%Y-%m-%d)"
          git push
